            { id: 'som', name: 'Strength of Materials', chapters: [{ id: 'som-1', name: 'Introduction & Properties of Materials', theory: false, questions: false }, { id: 'som-2', name: 'Axially Loaded Members', theory: false, questions: false }, { id: 'som-3', name: 'Torsion in Circular Shafts', theory: false, questions: false }, { id: 'som-4', name: 'Shear Forces and Bending Moments', theory: false, questions: false }, { id: 'som-5', name: 'Bending Stresses in Beams', theory: false, questions: false }, { id: 'som-6', name: 'Shear Stresses in Beams', theory: false, questions: false }, { id: 'som-7', name: 'Deflection of Beams', theory: false, questions: false }, { id: 'som-8', name: 'Energy Methods', theory: false, questions: false }, { id: 'som-9', name: 'Complex Stresses and Strains', theory: false, questions: false }, { id: 'som-10', name: 'Pressure Vessels', theory: false, questions: false }, { id: 'som-11', name: 'Combine Loading', theory: false, questions: false }, { id: 'som-12', name: 'Columns', theory: false, questions: false }] },
            { id: 'tom', name: 'Theory of Machines', chapters: [{ id: 'tom-1', name: 'Simple Mechanism', theory: false, questions: false }, { id: 'tom-2', name: 'Velocity Analysis', theory: false, questions: false }, { id: 'tom-3', name: 'Acceleration Analysis', theory: false, questions: false }, { id: 'tom-4', name: 'Gear', theory: false, questions: false }, { id: 'tom-5', name: 'Gear Train', theory: false, questions: false }, { id: 'tom-6', name: 'Analysis of Single Slider Crank Mechanism', theory: false, questions: false }, { id: 'tom-7', name: 'Flywheel', theory: false, questions: false }, { id: 'tom-8', name: 'Balancing', theory: false, questions: false }, { id: 'tom-9', name: 'Vibration', theory: false, questions: false }, { id: 'tom-10', name: 'Gyroscopic Couple', theory: false, questions: false }, { id: 'tom-11', name: 'Cam and Follower', theory: false, questions: false }, { id: 'tom-12', name: 'Governor', theory: false, questions: false }] },
            { id: 'verbal', name: 'Verbal Aptitude', chapters: [{ id: 'verb-1', name: 'Parts of Speech', theory: false, questions: false }, { id: 'verb-2', name: 'Non-Grammar', theory: false, questions: false }, { id: 'verb-3', name: 'Vocabulary', theory: false, questions: false }, { id: 'verb-4', name: 'Reading Comprehension', theory: false, questions: false }] }
        ];

        // --- ICONS (SVG Strings) ---
        const icons = {
            zap: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-12 h-12 animate-pulse"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 9.81h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14.19H4z"/></svg>`,
            shield: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-cyan-400"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/></svg>`,
            database: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>`,
            clock: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
            target: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-fuchsia-500"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
            chevronUp: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m18 15-6-6-6 6"/></svg>`,
            chevronDown: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m6 9 6 6 6-6"/></svg>`,
            checkSquare: (colorClass) => `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 ${colorClass}"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="m9 12 2 2 4-4"/></svg>`,
            square: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-transparent"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>`,
            logout: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`
        };

        // --- STATE ---
        const state = {
            firebaseUser: null, // Underlying platform auth
            customUser: null,   // Holds the authenticated custom username
            view: 'loading',    // 'loading' | 'auth' | 'app'
            authMode: 'login',  // 'login' | 'register'
            authError: '',
            subjects: INITIAL_SUBJECTS,
            expanded: {},
            countdown: { d: 0, h: 0, m: 0, s: 0 }
        };

        // Target Date: Approx First Weekend of Feb 2027
        const GATE_DATE = new Date('2027-02-06T09:30:00+05:30').getTime();

        // --- FIREBASE SETUP ---
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        const firebaseConfig = JSON.parse(firebaseConfigStr);
        let app, auth, db;
        let unsubscribeFirestore = null;
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'gate-2027-tracker';

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase init error", e);
        }

        // --- INIT APP ---
        function init() {
            render(); // Render initial loading UI
            
            const initAuth = async () => {
                try {
                    // Must authenticate with environment to gain Firestore read/write capabilities
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.error("Auth Error:", err);
                    state.authError = "System Initialization Failed";
                    render();
                }
            };
            
            if (auth) {
                initAuth();
                onAuthStateChanged(auth, (usr) => {
                    state.firebaseUser = usr;
                    if (usr) {
                        // Core platform auth successful, show our custom login screen
                        state.view = 'auth';
                        render();
                    } else {
                        state.view = 'loading';
                        render();
                    }
                });
            } else {
                state.view = 'auth';
                render();
            }

            // Start Countdown Timer
            setInterval(() => {
                const now = new Date().getTime();
                const distance = GATE_DATE - now;

                if (distance < 0) return;

                state.countdown = {
                    d: Math.floor(distance / (1000 * 60 * 60 * 24)),
                    h: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                    m: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                    s: Math.floor((distance % (1000 * 60)) / 1000)
                };
                updateCountdownDOM();
            }, 1000);

            // Set up Event Listeners
            setupEventListeners();
        }

        // --- AUTH & DATA LOGIC ---

        window.toggleAuthMode = function() {
            state.authMode = state.authMode === 'login' ? 'register' : 'login';
            state.authError = '';
            render();
        }

        window.submitAuth = async function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('auth-username').value.trim().toLowerCase();
            const pinInput = document.getElementById('auth-pin').value;

            if (!usernameInput || !usernameInput.match(/^[a-z0-9_]{3,15}$/)) {
                state.authError = "Username: 3-15 chars, letters, numbers, and underscores only.";
                render(); return;
            }
            if (!pinInput || !pinInput.match(/^[0-9]{6}$/)) {
                state.authError = "PIN must be exactly 6 digits.";
                render(); return;
            }

            state.view = 'loading';
            render();

            try {
                // Using public data pool to store custom account mapping as requested
                const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'gateAccounts', usernameInput);
                const userSnap = await getDoc(userDocRef);

                if (state.authMode === 'register') {
                    if (userSnap.exists()) {
                        state.authError = "Username is already claimed by another operative.";
                        state.view = 'auth';
                    } else {
                        // Create new profile with fresh subjects
                        await setDoc(userDocRef, { pin: pinInput, subjects: INITIAL_SUBJECTS });
                        state.customUser = { username: usernameInput };
                        state.subjects = JSON.parse(JSON.stringify(INITIAL_SUBJECTS)); // deep copy clone
                        state.view = 'app';
                        setupFirestoreListener();
                    }
                } else { // Login
                    if (!userSnap.exists()) {
                        state.authError = "Operative ID not found.";
                        state.view = 'auth';
                    } else {
                        const data = userSnap.data();
                        if (data.pin !== pinInput) {
                            state.authError = "Access Denied: Incorrect PIN.";
                            state.view = 'auth';
                        } else {
                            state.customUser = { username: usernameInput };
                            // Load existing data or fallback to defaults
                            state.subjects = data.subjects || JSON.parse(JSON.stringify(INITIAL_SUBJECTS));
                            state.view = 'app';
                            setupFirestoreListener();
                        }
                    }
                }
            } catch (err) {
                console.error("Firestore error:", err);
                state.authError = "Network interface offline. Try again.";
                state.view = 'auth';
            }
            render();
        }

        window.logout = function() {
            if (unsubscribeFirestore) unsubscribeFirestore();
            state.customUser = null;
            state.subjects = INITIAL_SUBJECTS; // Flush local data to avoid ghost data
            state.authError = '';
            state.authMode = 'login';
            state.view = 'auth';
            render();
        }

        function setupFirestoreListener() {
            if (!state.firebaseUser || !state.customUser || !db) return;
            if (unsubscribeFirestore) unsubscribeFirestore();

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'gateAccounts', state.customUser.username);
            unsubscribeFirestore = onSnapshot(docRef, (snap) => {
                if (snap.exists() && snap.data().subjects) {
                    state.subjects = snap.data().subjects;
                }
                render();
            }, (error) => {
                console.error("Firestore Listen Error:", error);
            });
        }

        async function saveToCloud() {
            if (!state.firebaseUser || !state.customUser || !db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'gateAccounts', state.customUser.username);
                await setDoc(docRef, { subjects: state.subjects }, { merge: true });
            } catch (e) {
                console.error("Save error", e);
            }
        }

        // --- INTERACTION HANDLERS ---
        window.toggleExpand = function(subjectId) {
            state.expanded[subjectId] = !state.expanded[subjectId];
            render(); 
        };

        window.markSubjectComplete = function(subjectId, isComplete) {
            state.subjects = state.subjects.map(sub => {
                if (sub.id !== subjectId) return sub;
                return {
                    ...sub,
                    chapters: sub.chapters.map(chap => ({
                        ...chap,
                        theory: isComplete,
                        questions: isComplete
                    }))
                };
            });
            render();
            saveToCloud();
        };

        window.toggleChapter = function(subjectId, chapterId, type) {
            state.subjects = state.subjects.map(sub => {
                if (sub.id !== subjectId) return sub;
                return {
                    ...sub,
                    chapters: sub.chapters.map(chap => {
                        if (chap.id !== chapterId) return chap;
                        return { ...chap, [type]: !chap[type] };
                    })
                };
            });
            render();
            saveToCloud();
        };

        function setupEventListeners() {
            document.getElementById('app').addEventListener('click', (e) => {
                const markBtn = e.target.closest('[data-action="markComplete"]');
                if (markBtn) {
                    const subjectId = markBtn.getAttribute('data-subject-id');
                    const isComplete = markBtn.getAttribute('data-is-complete') === 'true';
                    window.markSubjectComplete(subjectId, !isComplete);
                    return;
                }

                const expandBtn = e.target.closest('[data-action="toggleExpand"]');
                if (expandBtn) {
                    const subjectId = expandBtn.getAttribute('data-subject-id');
                    window.toggleExpand(subjectId);
                    return;
                }

                const chapterToggle = e.target.closest('[data-action="toggleChapter"]');
                if (chapterToggle) {
                    const subjectId = chapterToggle.getAttribute('data-subject-id');
                    const chapterId = chapterToggle.getAttribute('data-chapter-id');
                    const type = chapterToggle.getAttribute('data-type');
                    window.toggleChapter(subjectId, chapterId, type);
                    return;
                }
            });
        }

        // --- CALCULATIONS ---
        function calculateSubjectProgress(chapters) {
            if (chapters.length === 0) return 0;
            const total = chapters.length * 2;
            const completed = chapters.reduce((acc, curr) => acc + (curr.theory ? 1 : 0) + (curr.questions ? 1 : 0), 0);
            return Math.round((completed / total) * 100);
        }

        function getOverallStats() {
            let tTasks = 0;
            let cTasks = 0;
            state.subjects.forEach(sub => {
                tTasks += sub.chapters.length * 2;
                cTasks += sub.chapters.reduce((acc, curr) => acc + (curr.theory ? 1 : 0) + (curr.questions ? 1 : 0), 0);
            });
            return {
                overallProgress: tTasks === 0 ? 0 : Math.round((cTasks / tTasks) * 100),
                totalTasks: tTasks,
                completedTasks: cTasks
            };
        }

        // --- RENDER FUNCTIONS ---
        function renderProgressBar(progress, height = "h-2", colorClass = "bg-cyan-500", glowClass = "shadow-[0_0_15px_#06b6d4]") {
            return `
                <div class="w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700/50 ${height}">
                    <div class="${height} rounded-full transition-all duration-700 ease-out ${colorClass} ${glowClass}"
                         style="width: ${progress}%"></div>
                </div>
            `;
        }

        function renderCheckbox(checked, label, type, subjectId, chapterId) {
            const isTheory = type === 'theory';
            const colorClass = isTheory ? 'text-cyan-400' : 'text-fuchsia-400';
            const bgCheckedClass = isTheory ? 'bg-cyan-500/20' : 'bg-fuchsia-500/20';
            const borderClass = checked ? (isTheory ? 'border-cyan-400' : 'border-fuchsia-400') : 'border-slate-600';
            const glowClass = checked ? (isTheory ? 'shadow-[0_0_8px_#22d3ee]' : 'shadow-[0_0_8px_#e879f9]') : '';
            const bgBoxClass = checked ? (isTheory ? 'bg-cyan-900/50' : 'bg-fuchsia-900/50') : 'bg-slate-900';
            const wrapperHoverClass = checked ? bgCheckedClass : 'hover:bg-slate-800/50';
            const textHoverClass = checked ? colorClass : 'text-slate-400 group-hover:text-slate-300';
            const iconSvg = checked ? icons.checkSquare(colorClass) : icons.square;

            return `
                <div data-action="toggleChapter" data-subject-id="${subjectId}" data-chapter-id="${chapterId}" data-type="${type}"
                     class="flex items-center gap-2 cursor-pointer group p-1.5 rounded-md transition-colors ${wrapperHoverClass}">
                    <div class="relative flex items-center justify-center w-5 h-5 rounded transition-all duration-300 border ${borderClass} ${glowClass} ${bgBoxClass}">
                        ${iconSvg}
                    </div>
                    <span class="text-sm font-medium tracking-wide transition-colors ${textHoverClass}">
                        ${label}
                    </span>
                </div>
            `;
        }

        function updateCountdownDOM() {
            const cdDay = document.getElementById('cd-day');
            if (cdDay && state.view === 'app') {
                cdDay.innerText = state.countdown.d.toString().padStart(2, '0');
                document.getElementById('cd-hrs').innerText = state.countdown.h.toString().padStart(2, '0');
                document.getElementById('cd-min').innerText = state.countdown.m.toString().padStart(2, '0');
                document.getElementById('cd-sec').innerText = state.countdown.s.toString().padStart(2, '0');
            }
        }

        function render() {
            const appDiv = document.getElementById('app');

            // --- LOADING VIEW ---
            if (state.view === 'loading') {
                appDiv.innerHTML = `
                    <div class="min-h-screen bg-slate-950 flex items-center justify-center font-sans text-cyan-400">
                        <div class="flex flex-col items-center gap-4">
                            ${icons.zap}
                            <p class="tracking-widest uppercase text-sm">Initializing Neural Uplink...</p>
                        </div>
                    </div>
                `;
                return;
            }

            // Shared Background Elements for Auth & App views
            const backgroundHTML = `
                <!-- Cyberpunk Grid Background Overlay -->
                <div class="fixed inset-0 pointer-events-none opacity-[0.03] z-0" 
                     style="background-image: linear-gradient(to right, #06b6d4 1px, transparent 1px), linear-gradient(to bottom, #06b6d4 1px, transparent 1px); background-size: 40px 40px;"></div>
                
                <!-- Glow Orbs -->
                <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
                <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-fuchsia-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>
            `;

            // --- AUTH VIEW ---
            if (state.view === 'auth') {
                appDiv.innerHTML = `
                    ${backgroundHTML}
                    <div class="min-h-screen flex items-center justify-center p-4 relative z-10">
                        <div class="w-full max-w-md p-8 bg-slate-900/80 backdrop-blur-xl border border-cyan-900/50 rounded-2xl shadow-[0_0_40px_rgba(6,182,212,0.1)]">
                            <div class="text-center mb-8">
                                <h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-2 uppercase flex items-center justify-center gap-3">
                                    ${icons.shield} NEURAL LOGIN
                                </h1>
                                <p class="text-slate-400 font-mono text-xs tracking-widest uppercase">
                                    Authenticate to access GATE 2027 parameters
                                </p>
                            </div>

                            <form onsubmit="submitAuth(event)" class="space-y-6">
                                <div>
                                    <label class="block text-cyan-500 font-mono text-xs tracking-widest mb-2 uppercase">Operative ID (Username)</label>
                                    <input type="text" id="auth-username" required pattern="[a-zA-Z0-9_]{3,15}"
                                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-slate-200 font-mono focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder-slate-700"
                                        placeholder="e.g. shadow_01">
                                </div>

                                <div>
                                    <label class="block text-fuchsia-500 font-mono text-xs tracking-widest mb-2 uppercase">Access Code (6-Digit PIN)</label>
                                    <input type="password" id="auth-pin" required pattern="[0-9]{6}" maxlength="6"
                                        class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-3 text-slate-200 font-mono tracking-[0.5em] focus:outline-none focus:border-fuchsia-500 focus:ring-1 focus:ring-fuchsia-500 transition-all placeholder-slate-700"
                                        placeholder="••••••">
                                </div>

                                ${state.authError ? `<div class="text-red-400 text-sm font-mono text-center bg-red-900/20 border border-red-900/50 p-2 rounded shadow-inner">${state.authError}</div>` : ''}

                                <button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-3 rounded-lg uppercase tracking-widest text-sm transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)]">
                                    ${state.authMode === 'login' ? 'Initiate Link' : 'Register ID'}
                                </button>
                            </form>

                            <div class="mt-6 text-center">
                                <button type="button" onclick="toggleAuthMode()" class="text-slate-400 hover:text-cyan-400 font-mono text-xs tracking-wider transition-colors border-b border-transparent hover:border-cyan-400 pb-0.5">
                                    ${state.authMode === 'login' ? 'New Operative? Register Here.' : 'Existing Operative? Login Here.'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // --- MAIN APP VIEW ---
            const stats = getOverallStats();
            const overallColorClass = stats.overallProgress > 75 ? "bg-emerald-500" : stats.overallProgress > 40 ? "bg-cyan-500" : "bg-fuchsia-500";
            const overallGlowClass = stats.overallProgress > 75 ? "shadow-[0_0_15px_#10b981]" : stats.overallProgress > 40 ? "shadow-[0_0_15px_#06b6d4]" : "shadow-[0_0_15px_#d946ef]";

            let subjectsHTML = '';
            
            state.subjects.forEach(subject => {
                const isExpanded = state.expanded[subject.id];
                const progress = calculateSubjectProgress(subject.chapters);
                const isComplete = progress === 100;
                
                const containerBorder = isExpanded ? 'border-cyan-800/60 shadow-[0_4px_20px_rgba(6,182,212,0.05)]' : 'border-slate-800/60 hover:border-slate-700';
                const chevronIcon = isExpanded ? icons.chevronUp : icons.chevronDown;
                const chevronBg = isComplete ? 'bg-emerald-500/10 text-emerald-400' : 'bg-slate-800 text-cyan-500 group-hover:bg-slate-700 group-hover:text-cyan-400';
                const titleColor = isComplete ? 'text-emerald-400' : 'text-slate-200 group-hover:text-white';
                const pgColorClass = isComplete ? "bg-emerald-500" : "bg-cyan-500";
                const pgGlowClass = isComplete ? "shadow-[0_0_8px_#10b981]" : "shadow-[0_0_8px_#06b6d4]";
                const pgGlowClassMobile = isComplete ? "shadow-[0_0_5px_#10b981]" : "shadow-[0_0_5px_#06b6d4]";
                const btnClasses = isComplete 
                    ? 'border-emerald-500/30 text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20' 
                    : 'border-slate-700 text-slate-400 hover:border-cyan-500/50 hover:text-cyan-400 hover:bg-cyan-900/20';
                const btnText = isComplete ? 'Override: Reset' : 'Execute: Max';

                let chaptersHTML = '';
                if (isExpanded) {
                    chaptersHTML = `
                        <div class="border-t border-slate-800/50 bg-slate-950/50 p-4 sm:p-5">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3">
                                ${subject.chapters.map(chapter => `
                                    <div class="flex flex-col sm:flex-row sm:items-center justify-between p-3 rounded-lg bg-slate-900/40 border border-slate-800/40 hover:border-slate-700 transition-colors gap-3">
                                        <span class="text-sm text-slate-300 font-medium truncate flex-1" title="${chapter.name}">
                                            ${chapter.name}
                                        </span>
                                        <div class="flex items-center gap-4 shrink-0">
                                            ${renderCheckbox(chapter.theory, 'THY', 'theory', subject.id, chapter.id)}
                                            <div class="w-px h-5 bg-slate-700"></div>
                                            ${renderCheckbox(chapter.questions, 'PYQ', 'questions', subject.id, chapter.id)}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                subjectsHTML += `
                    <div class="bg-slate-900/40 backdrop-blur-sm border rounded-xl overflow-hidden transition-all duration-300 ${containerBorder}">
                        <div data-action="toggleExpand" data-subject-id="${subject.id}" class="p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 cursor-pointer select-none group">
                            <div class="flex items-center gap-3 flex-1 min-w-0">
                                <div class="p-2 rounded-lg transition-colors ${chevronBg}">
                                    ${chevronIcon}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h3 class="font-bold text-lg truncate transition-colors ${titleColor}">
                                        ${subject.name}
                                    </h3>
                                    <div class="flex items-center gap-3 mt-1.5">
                                        <div class="w-32 hidden sm:block">
                                            ${renderProgressBar(progress, "h-1.5", pgColorClass, pgGlowClass)}
                                        </div>
                                        <span class="text-xs font-mono text-slate-400">${progress}%</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center justify-end sm:w-auto">
                                <button data-action="markComplete" data-subject-id="${subject.id}" data-is-complete="${isComplete}"
                                        class="text-xs font-mono uppercase tracking-wider px-3 py-1.5 rounded border transition-all ${btnClasses}">
                                    ${btnText}
                                </button>
                            </div>
                            <div class="sm:hidden w-full mt-2">
                                ${renderProgressBar(progress, "h-1", pgColorClass, pgGlowClassMobile)}
                            </div>
                        </div>
                        ${chaptersHTML}
                    </div>
                `;
            });

            const userDisplay = state.customUser 
                ? `<div class="flex items-center gap-2">
                     <span class="text-cyan-400 font-bold uppercase border border-cyan-800 bg-cyan-950/50 px-2 py-0.5 rounded shadow-[0_0_5px_rgba(6,182,212,0.3)]">
                        @${state.customUser.username}
                     </span>
                     <button onclick="logout()" class="text-slate-500 hover:text-fuchsia-400 transition-colors p-1" title="Disconnect Session">
                         ${icons.logout}
                     </button>
                   </div>` 
                : '';

            appDiv.innerHTML = `
                ${backgroundHTML}
                <div class="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8 relative z-10">
                    <!-- HEADER -->
                    <header class="mb-10 mt-4 flex flex-col md:flex-row items-center justify-between gap-6">
                        <div class="text-center md:text-left">
                            <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 drop-shadow-[0_0_10px_rgba(34,211,238,0.4)] mb-2 uppercase flex items-center gap-3 justify-center md:justify-start">
                                ${icons.shield} GATE 2027
                            </h1>
                            <div class="text-slate-400 font-mono text-sm tracking-widest flex items-center justify-center md:justify-start gap-2">
                                ${icons.database} OPERATION AIR-100
                                <span class="mx-1">•</span>
                                ${userDisplay}
                            </div>
                        </div>

                        <!-- Countdown Widget -->
                        <div class="bg-slate-900/80 backdrop-blur-md border border-cyan-900/50 rounded-xl p-4 flex flex-col items-center shadow-[0_0_20px_rgba(6,182,212,0.1)]">
                            <div class="flex items-center gap-2 text-cyan-500 mb-2">
                                ${icons.clock}
                                <span class="text-xs uppercase tracking-[0.2em] font-bold">REALITY CHECK IN</span>
                            </div>
                            <div class="flex gap-4 font-mono">
                                <div class="flex flex-col items-center">
                                    <div id="cd-day" class="bg-slate-950 border border-slate-800 text-cyan-300 w-12 h-12 flex items-center justify-center rounded-lg text-xl font-bold shadow-inner">${state.countdown.d.toString().padStart(2, '0')}</div>
                                    <span class="text-[10px] text-slate-500 mt-1">DAY</span>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div id="cd-hrs" class="bg-slate-950 border border-slate-800 text-cyan-300 w-12 h-12 flex items-center justify-center rounded-lg text-xl font-bold shadow-inner">${state.countdown.h.toString().padStart(2, '0')}</div>
                                    <span class="text-[10px] text-slate-500 mt-1">HRS</span>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div id="cd-min" class="bg-slate-950 border border-slate-800 text-cyan-300 w-12 h-12 flex items-center justify-center rounded-lg text-xl font-bold shadow-inner">${state.countdown.m.toString().padStart(2, '0')}</div>
                                    <span class="text-[10px] text-slate-500 mt-1">MIN</span>
                                </div>
                                <div class="flex flex-col items-center">
                                    <div id="cd-sec" class="bg-slate-950 border border-slate-800 text-cyan-300 w-12 h-12 flex items-center justify-center rounded-lg text-xl font-bold shadow-inner">${state.countdown.s.toString().padStart(2, '0')}</div>
                                    <span class="text-[10px] text-slate-500 mt-1">SEC</span>
                                </div>
                            </div>
                        </div>
                    </header>

                    <!-- OVERALL PROGRESS -->
                    <section class="mb-10 bg-slate-900/60 backdrop-blur-lg border border-slate-800 rounded-2xl p-6 relative overflow-hidden group">
                        <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-cyan-500 to-fuchsia-500"></div>
                        
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <h2 class="text-lg uppercase tracking-widest text-slate-300 flex items-center gap-2 mb-1">
                                    ${icons.target} PREPARATION STATUS
                                </h2>
                                <p class="text-slate-500 text-sm font-mono">${stats.completedTasks} / ${stats.totalTasks} Targets Eliminated</p>
                            </div>
                            <div class="text-right">
                                <span class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-br from-white to-slate-500">
                                    ${stats.overallProgress}%
                                </span>
                            </div>
                        </div>
                        
                        ${renderProgressBar(stats.overallProgress, "h-3", overallColorClass, overallGlowClass)}
                    </section>

                    <!-- SUBJECTS LIST -->
                    <div class="space-y-4 pb-20">
                        ${subjectsHTML}
                    </div>
                </div>
            `;
            
            // Re-bind DOM references for the ticker
            updateCountdownDOM();
        }

        // Boot
        init();

    </script>
</body>
</html>
